<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <script src="js/libs/bootstrap.min.js"></script>
    <script src="js/utils/include.js"></script>
    <script type="module" src="js/register.js"></script>
    <script src="js/libs/axios.min.js"></script>
    <script src="js/header.js" type="module"></script>
  </head>
  <body class="dark">
    <div id="page-header"></div>

    <!-- NOMBRE SECCIÓN -->
    <div class="container">
      <div class="row text-center">
        <div class="col-md">
          <h3>Register a new user</h3>
        </div>
        <hr />
      </div>
    </div>

    <form class="container" id="register-form">
      <div id="errors"></div>
      <div class="row">
        <div class="col-md mb-2">
          <div class="form-group">
            <label for="firstname-input">First name:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="firstname-input"
              name="firstName"
              placeholder="First name"
            />
          </div>
        </div>

        <div class="col-md mb-2">
          <div class="form-group">
            <label for="lastname-input">Last name:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="lastname-input"
              name="lastName"
              placeholder="Last name"
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md mb-2">
          <div class="form-group">
            <label for="email-input">Email:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="email-input"
              name="email"
              placeholder="Email"
            />
          </div>
        </div>

        <div class="col-md mb-2">
          <div class="form-group">
            <label for="telephone-input">Phone number:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="telephone-input"
              name="telephone"
              placeholder="Phone number"
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md mb-2">
          <div class="form-group">
            <label for="username-input">Username:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="username-input"
              name="username"
              placeholder="Username"
            />
          </div>
        </div>

        <div class="col-md mb-2">
          <div class="form-group">
            <label for="password-input">Password:</label>
            <input
              type="password"
              class="form-control text-light bg-dark"
              id="password-input"
              name="password"
              placeholder="Password"
            />
          </div>
        </div>

        <div class="col-md mb-2">
          <div class="form-group">
            <label for="password2-input">Repeat password:</label>
            <input
              type="password"
              class="form-control text-light bg-dark"
              id="password2-input"
              name="password2"
              placeholder="Repeat password"
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md mb-2">
          <div class="form-group">
            <label for="avatarUrl-input">Profile picture link:</label>
            <input
              type="text"
              class="form-control text-light bg-dark"
              id="avatarUrl-input"
              name="avatarUrl"
              placeholder="Profile picture link"
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md text-center">
          <button type="submit" class="btn btn-primary mt-3">Register</button>
        </div>
      </div>
    </form>

    <script>
      include("header.html", "#page-header");
    </script>
  </body>
</html>
