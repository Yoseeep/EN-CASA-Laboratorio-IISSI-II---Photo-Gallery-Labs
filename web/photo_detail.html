<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Detail</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <script src="js/libs/bootstrap.min.js"></script>
    <script src="js/utils/include.js"></script>
    <script src="js/renderers/photo_detail.js" type="module"></script>
    <script src="js/libs/axios.min.js"></script>
  </head>
  <body class="dark">
    <div id="page-header"></div>

    <!-- NOMBRE SECCIÓN -->
    <!-- <div class="container">
      <div class="row text-center">
        <div class="col-md">
          <h3>Photo Detail</h3>
        </div>
        <hr />
      </div>
    </div> -->

    <div class="container" id="errors" ></div>

    <!-- CONTENT -->
    <div class="container">
      <div class="row text-center">
        <div class="col-md-9" id="photo-details-column"></div>

        <div class="col-md-3 pt-3 pt-md-0" id="photo-actions-column">
          <div class="mb-3">
            <button class="btn btn-primary mb-1">Edit this photo</button>
            <button class="btn btn-danger mb-1">Delete this photo</button>
          </div>
          <form>
            <div class="form-group">
              <label for="rating-input">Rate this photo:</label>
              <select id="rating-input" name="rating" class="form-control">
                <option value="1">*</option>
                <option value="2">**</option>
                <option value="3">***</option>
                <option value="4">****</option>
                <option value="5">*****</option>
              </select>
              <button type="submit" class="btn btn-success">Rate</button>
            </div>
          </form>
        </div>
      </div>

      <div class="row text-center m-4">
        <div class="col-md">
          <a href="index.html" class="btn btn-primary">Return to the gallery</a>
        </div>
      </div>
    </div>

    <script>
      include("header.html", "#page-header");
    </script>
  </body>
</html>
