<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Photo</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <script src="js/libs/bootstrap.min.js"></script>
    <script src="js/utils/include.js"></script>
    <script type="module" src="js/edit_photo.js"></script>
    <script src="js/libs/axios.min.js"></script>
    <script src="js/header.js" type="module"></script>
  </head>
  <body class="dark">
    <div id="page-header"></div>

    <!-- NOMBRE SECCIÓN -->
    <div class="container">
      <div class="row text-center">
        <div class="col-md">
          <h3 id="page-title">Uploading Photo</h3>
        </div>
        <hr />
      </div>
    </div>

    <div class="container" id="errors"></div>

    <!-- FORMULARIO DE EDICIÓN DE FOTO -->
    <form id="form-photo-upload" class="container">
      <div class="form-group mb-2">
        <label for="input-url">URL:</label>
        <input
          required
          type="text"
          class="form-control text-light bg-dark"
          id="input-url"
          name="url"
          placeholder="Photo URL"
        />
      </div>

      <div class="form-group mb-2">
        <label for="input-title">Title:</label>
        <input
          required
          type="text"
          class="form-control text-light bg-dark"
          id="input-title"
          name="title"
          placeholder="Title"
        />
      </div>

      <div class="form-group mb-2">
        <label for="input-description">Description:</label>
        <textarea
          class="form-control text-light bg-dark"
          id="input-description"
          name="description"
          placeholder="Describe your image..."
          rows="4"
        ></textarea>
      </div>

      <div class="form-group mb-2">
        <label for="input-visibility">Visibility:</label>
        <select
          required
          class="form-control text-light bg-dark"
          id="input-visibility"
          name="visibility"
        >
          <option value="Public">Public</option>
          <option value="Private">Private</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md text-center">
          <button type="submit" class="btn btn-primary mt-3">Send</button>
        </div>
      </div>
    </form>

    <script>
      include("header.html", "#page-header");
    </script>
  </body>
</html>
